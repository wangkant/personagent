<svg width="100%" viewBox="0 0 720 560" role="img" xmlns="http://www.w3.org/2000/svg">
<title>persona-llm-agent 架构</title>
<desc>双入站路径汇入同一条共享 agent 管线：QQ 经 OneBot 协议端走 /webhook/qq，其他平台经 AstrBot 网关走 /webhook/gateway。</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#73726c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>
<g font-family="'Anthropic Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">

<!-- 入站：两条路径 -->
<rect x="40" y="16" width="300" height="54" rx="10" fill="#f1efe8" stroke="#5f5e5a" stroke-width="0.5"/>
<text x="190" y="37" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#444441">QQ &#8212; OneBot 协议端</text>
<text x="190" y="55" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5f5e5a">NapCat / Lagrange（直连）</text>

<rect x="380" y="16" width="300" height="54" rx="10" fill="#f1efe8" stroke="#5f5e5a" stroke-width="0.5"/>
<text x="530" y="37" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#444441">其他平台 &#8212; AstrBot</text>
<text x="530" y="55" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5f5e5a">Telegram &#183; Discord &#183; Slack &#183; &#8230; + 转发插件</text>

<line x1="190" y1="70" x2="190" y2="104" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="200" y="88" dominant-baseline="central" font-size="12" fill="#3d3d3a">/webhook/qq</text>
<line x1="530" y1="70" x2="530" y2="104" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="540" y="88" dominant-baseline="central" font-size="12" fill="#3d3d3a">/webhook/gateway</text>

<!-- 共享 agent 管线 -->
<rect x="40" y="108" width="640" height="374" rx="14" fill="#eeedfe" stroke="#534ab7" stroke-width="0.5"/>
<text x="60" y="130" dominant-baseline="central" font-size="14" font-weight="500" fill="#3c3489">FastAPI agent &#8212; 一条管线，任意平台</text>

<rect x="90" y="150" width="540" height="46" rx="8" fill="#e6f1fb" stroke="#185fa5" stroke-width="0.5"/>
<text x="360" y="168" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#0c447c">去重 / 防抖 / sticky-call</text>
<text x="360" y="184" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#185fa5">跨重启 message id 去重</text>
<line x1="360" y1="196" x2="360" y2="210" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="90" y="210" width="540" height="46" rx="8" fill="#e6f1fb" stroke="#185fa5" stroke-width="0.5"/>
<text x="360" y="228" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#0c447c">视觉 + URL 元信息</text>
<text x="360" y="244" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#185fa5">表情 caption / 分享卡解析</text>
<line x1="360" y1="256" x2="360" y2="270" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="90" y="270" width="540" height="46" rx="8" fill="#e6f1fb" stroke="#185fa5" stroke-width="0.5"/>
<text x="360" y="288" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#0c447c">模式判定</text>
<text x="360" y="304" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#185fa5">owner / called / followup / judge</text>
<line x1="360" y1="316" x2="360" y2="330" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="90" y="330" width="540" height="46" rx="8" fill="#e1f5ee" stroke="#0f6e56" stroke-width="0.5"/>
<text x="360" y="348" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">LLM 调用（JSON 协议）</text>
<text x="360" y="364" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0f6e56">Prompt caching、fail-closed 解析</text>
<line x1="360" y1="376" x2="360" y2="390" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="90" y="390" width="540" height="46" rx="8" fill="#faece7" stroke="#993c1d" stroke-width="0.5"/>
<text x="360" y="408" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#712b13">输出过滤 + 校验</text>
<text x="360" y="424" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#993c1d">语义正则 + 字符白名单</text>
<line x1="360" y1="436" x2="360" y2="450" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="90" y="450" width="540" height="20" rx="6" fill="#e1f5ee" stroke="#0f6e56" stroke-width="0.5"/>
<text x="360" y="460" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0f6e56">异步自评 &#8594; eval.jsonl</text>

<!-- 出站：两条路径 -->
<line x1="190" y1="482" x2="190" y2="512" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="200" y="500" dominant-baseline="central" font-size="12" fill="#3d3d3a">/send_group_msg</text>
<line x1="530" y1="482" x2="530" y2="512" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="540" y="500" dominant-baseline="central" font-size="12" fill="#3d3d3a">网关回复</text>

<rect x="40" y="514" width="300" height="34" rx="10" fill="#f1efe8" stroke="#5f5e5a" stroke-width="0.5"/>
<text x="190" y="531" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#444441">QQ 群聊 / 私聊</text>
<rect x="380" y="514" width="300" height="34" rx="10" fill="#f1efe8" stroke="#5f5e5a" stroke-width="0.5"/>
<text x="530" y="531" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#444441">Telegram / Discord / Slack / &#8230;</text>
</g>
</svg>
