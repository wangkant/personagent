<svg width="100%" viewBox="0 0 680 480" role="img" xmlns="http://www.w3.org/2000/svg">
<title>JSON 与 XML 输出协议对比</title>
<desc>XML 协议在标签拼错时会漏出推理；JSON 协议失败关闭，整条回复丢弃。</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<style>
text { font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", "Anthropic Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
</style>

<text x="170" y="30" text-anchor="middle" dominant-baseline="central" fill="rgb(20, 20, 19)" font-size="14" font-weight="500">XML 协议</text>
<text x="510" y="30" text-anchor="middle" dominant-baseline="central" fill="rgb(20, 20, 19)" font-size="14" font-weight="500">JSON 协议</text>

<g>
<rect x="40" y="50" width="260" height="60" rx="8" stroke-width="0.5" fill="rgb(241, 239, 232)" stroke="rgb(95, 94, 90)"/>
<text x="170" y="72" text-anchor="middle" dominant-baseline="central" fill="rgb(95, 94, 90)" font-size="12">模型输出被截断</text>
<text x="170" y="92" text-anchor="middle" dominant-baseline="central" fill="rgb(95, 94, 90)" font-size="12">reply 标签未闭合</text>
</g>

<g>
<rect x="380" y="50" width="260" height="60" rx="8" stroke-width="0.5" fill="rgb(241, 239, 232)" stroke="rgb(95, 94, 90)"/>
<text x="510" y="72" text-anchor="middle" dominant-baseline="central" fill="rgb(95, 94, 90)" font-size="12">模型输出被截断</text>
<text x="510" y="92" text-anchor="middle" dominant-baseline="central" fill="rgb(95, 94, 90)" font-size="12">JSON 对象不完整</text>
</g>

<line x1="170" y1="110" x2="170" y2="138" marker-end="url(#arrow)" fill="none" stroke="rgb(115, 114, 108)" stroke-width="1.5"/>
<line x1="510" y1="110" x2="510" y2="138" marker-end="url(#arrow)" fill="none" stroke="rgb(115, 114, 108)" stroke-width="1.5"/>

<g>
<rect x="40" y="138" width="260" height="60" rx="8" stroke-width="0.5" fill="rgb(250, 238, 218)" stroke="rgb(133, 79, 11)"/>
<text x="170" y="160" text-anchor="middle" dominant-baseline="central" fill="rgb(133, 79, 11)" font-size="12">正则降级到原始文本</text>
<text x="170" y="180" text-anchor="middle" dominant-baseline="central" fill="rgb(133, 79, 11)" font-size="12">reasoning 被拼到 reply</text>
</g>

<g>
<rect x="380" y="138" width="260" height="60" rx="8" stroke-width="0.5" fill="rgb(225, 245, 238)" stroke="rgb(15, 110, 86)"/>
<text x="510" y="160" text-anchor="middle" dominant-baseline="central" fill="rgb(15, 110, 86)" font-size="12">json.loads 抛异常</text>
<text x="510" y="180" text-anchor="middle" dominant-baseline="central" fill="rgb(15, 110, 86)" font-size="12">整条回复直接丢弃</text>
</g>

<line x1="170" y1="198" x2="170" y2="226" marker-end="url(#arrow)" fill="none" stroke="rgb(115, 114, 108)" stroke-width="1.5"/>
<line x1="510" y1="198" x2="510" y2="226" marker-end="url(#arrow)" fill="none" stroke="rgb(115, 114, 108)" stroke-width="1.5"/>

<g>
<rect x="40" y="226" width="260" height="120" rx="8" stroke-width="0.5" fill="rgb(250, 236, 231)" stroke="rgb(153, 60, 29)"/>
<text x="170" y="248" text-anchor="middle" dominant-baseline="central" fill="rgb(113, 43, 19)" font-size="14" font-weight="500">发到群里</text>
<text x="170" y="280" text-anchor="middle" dominant-baseline="central" fill="rgb(153, 60, 29)" font-size="12">用户在吐槽匹配机制，</text>
<text x="170" y="298" text-anchor="middle" dominant-baseline="central" fill="rgb(153, 60, 29)" font-size="12">应该共情，发：</text>
<text x="170" y="320" text-anchor="middle" dominant-baseline="central" fill="rgb(153, 60, 29)" font-size="12">对啊匹配机制烂死了</text>
</g>

<g>
<rect x="380" y="226" width="260" height="120" rx="8" stroke-width="0.5" fill="rgb(225, 245, 238)" stroke="rgb(15, 110, 86)"/>
<text x="510" y="248" text-anchor="middle" dominant-baseline="central" fill="rgb(8, 80, 65)" font-size="14" font-weight="500">什么也不发</text>
<text x="510" y="280" text-anchor="middle" dominant-baseline="central" fill="rgb(15, 110, 86)" font-size="12">Bot 本轮直接静默</text>
<text x="510" y="300" text-anchor="middle" dominant-baseline="central" fill="rgb(15, 110, 86)" font-size="12">推理永不漏出</text>
<text x="510" y="320" text-anchor="middle" dominant-baseline="central" fill="rgb(15, 110, 86)" font-size="12">最坏只是漏一条回复</text>
</g>

<g>
<rect x="40" y="380" width="260" height="60" rx="8" stroke-width="0.5" fill="rgb(250, 236, 231)" stroke="rgb(153, 60, 29)"/>
<text x="170" y="402" text-anchor="middle" dominant-baseline="central" fill="rgb(113, 43, 19)" font-size="14" font-weight="500">结果</text>
<text x="170" y="422" text-anchor="middle" dominant-baseline="central" fill="rgb(153, 60, 29)" font-size="12">内部思考被群友看到</text>
</g>

<g>
<rect x="380" y="380" width="260" height="60" rx="8" stroke-width="0.5" fill="rgb(225, 245, 238)" stroke="rgb(15, 110, 86)"/>
<text x="510" y="402" text-anchor="middle" dominant-baseline="central" fill="rgb(8, 80, 65)" font-size="14" font-weight="500">结果</text>
<text x="510" y="422" text-anchor="middle" dominant-baseline="central" fill="rgb(15, 110, 86)" font-size="12">默认 fail-closed</text>
</g>
</svg>
