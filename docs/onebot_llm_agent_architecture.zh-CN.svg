<svg width="100%" viewBox="0 0 680 542" role="img" xmlns="http://www.w3.org/2000/svg">
<title>onebot-llm-agent 架构</title>
<desc>从 OneBot 入站 webhook 经过 agent 处理各阶段到 OneBot 出站 API 的流水线。</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<style>
text { font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", "Anthropic Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
</style>

<g>
<rect x="220" y="20" width="240" height="44" rx="8" stroke-width="0.5" fill="rgb(241, 239, 232)" stroke="rgb(95, 94, 90)"/>
<text x="340" y="38" text-anchor="middle" dominant-baseline="central" fill="rgb(68, 68, 65)" font-size="14" font-weight="500">OneBot 协议端</text>
<text x="340" y="56" text-anchor="middle" dominant-baseline="central" fill="rgb(95, 94, 90)" font-size="12">NapCat / LLOneBot / Lagrange</text>
</g>

<line x1="340" y1="64" x2="340" y2="92" marker-end="url(#arrow)" fill="none" stroke="rgb(115, 114, 108)" stroke-width="1.5"/>
<text x="350" y="80" dominant-baseline="central" fill="rgb(61, 61, 58)" font-size="12">POST /webhook/qq</text>

<g>
<rect x="40" y="100" width="600" height="370" rx="14" stroke-width="0.5" fill="rgb(238, 237, 254)" stroke="rgb(83, 74, 183)"/>
<text x="60" y="124" dominant-baseline="central" fill="rgb(60, 52, 137)" font-size="14" font-weight="500">FastAPI (main.py)</text>
</g>

<g>
<rect x="80" y="148" width="520" height="44" rx="8" stroke-width="0.5" fill="rgb(230, 241, 251)" stroke="rgb(24, 95, 165)"/>
<text x="340" y="166" text-anchor="middle" dominant-baseline="central" fill="rgb(12, 68, 124)" font-size="14" font-weight="500">去重 / 防抖 / sticky-call</text>
<text x="340" y="184" text-anchor="middle" dominant-baseline="central" fill="rgb(24, 95, 165)" font-size="12">跨重启 message id 去重</text>
</g>
<line x1="340" y1="192" x2="340" y2="208" marker-end="url(#arrow)" fill="none" stroke="rgb(115, 114, 108)" stroke-width="1.5"/>

<g>
<rect x="80" y="208" width="520" height="44" rx="8" stroke-width="0.5" fill="rgb(230, 241, 251)" stroke="rgb(24, 95, 165)"/>
<text x="340" y="226" text-anchor="middle" dominant-baseline="central" fill="rgb(12, 68, 124)" font-size="14" font-weight="500">视觉 + URL 元信息</text>
<text x="340" y="244" text-anchor="middle" dominant-baseline="central" fill="rgb(24, 95, 165)" font-size="12">表情 caption / 分享卡解析</text>
</g>
<line x1="340" y1="252" x2="340" y2="268" marker-end="url(#arrow)" fill="none" stroke="rgb(115, 114, 108)" stroke-width="1.5"/>

<g>
<rect x="80" y="268" width="520" height="44" rx="8" stroke-width="0.5" fill="rgb(230, 241, 251)" stroke="rgb(24, 95, 165)"/>
<text x="340" y="286" text-anchor="middle" dominant-baseline="central" fill="rgb(12, 68, 124)" font-size="14" font-weight="500">模式判定</text>
<text x="340" y="304" text-anchor="middle" dominant-baseline="central" fill="rgb(24, 95, 165)" font-size="12">owner / called / followup / judge</text>
</g>
<line x1="340" y1="312" x2="340" y2="328" marker-end="url(#arrow)" fill="none" stroke="rgb(115, 114, 108)" stroke-width="1.5"/>

<g>
<rect x="80" y="328" width="520" height="44" rx="8" stroke-width="0.5" fill="rgb(225, 245, 238)" stroke="rgb(15, 110, 86)"/>
<text x="340" y="346" text-anchor="middle" dominant-baseline="central" fill="rgb(8, 80, 65)" font-size="14" font-weight="500">LLM 调用（JSON 协议）</text>
<text x="340" y="364" text-anchor="middle" dominant-baseline="central" fill="rgb(15, 110, 86)" font-size="12">Prompt caching、fail-closed 解析</text>
</g>
<line x1="340" y1="372" x2="340" y2="388" marker-end="url(#arrow)" fill="none" stroke="rgb(115, 114, 108)" stroke-width="1.5"/>

<g>
<rect x="80" y="388" width="520" height="44" rx="8" stroke-width="0.5" fill="rgb(250, 236, 231)" stroke="rgb(153, 60, 29)"/>
<text x="340" y="406" text-anchor="middle" dominant-baseline="central" fill="rgb(113, 43, 19)" font-size="14" font-weight="500">输出过滤 + 校验</text>
<text x="340" y="424" text-anchor="middle" dominant-baseline="central" fill="rgb(153, 60, 29)" font-size="12">语义正则 + 字符白名单</text>
</g>
<line x1="340" y1="432" x2="340" y2="448" marker-end="url(#arrow)" fill="none" stroke="rgb(115, 114, 108)" stroke-width="1.5"/>

<g>
<rect x="80" y="448" width="520" height="14" rx="6" stroke-width="0.5" fill="rgb(225, 245, 238)" stroke="rgb(15, 110, 86)"/>
<text x="340" y="455" text-anchor="middle" dominant-baseline="central" fill="rgb(15, 110, 86)" font-size="12">异步自评 → eval.jsonl</text>
</g>

<line x1="340" y1="470" x2="340" y2="498" marker-end="url(#arrow)" fill="none" stroke="rgb(115, 114, 108)" stroke-width="1.5"/>
<text x="350" y="486" dominant-baseline="central" fill="rgb(61, 61, 58)" font-size="12">POST /send_group_msg</text>

<g>
<rect x="220" y="498" width="240" height="34" rx="8" stroke-width="0.5" fill="rgb(241, 239, 232)" stroke="rgb(95, 94, 90)"/>
<text x="340" y="515" text-anchor="middle" dominant-baseline="central" fill="rgb(68, 68, 65)" font-size="14" font-weight="500">回到群聊</text>
</g>
</svg>
