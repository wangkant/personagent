<svg width="100%" viewBox="0 0 680 600" role="img" xmlns="http://www.w3.org/2000/svg">
<title>表情包库七步过滤</title>
<desc>从原始偷图到合人设可发送的表情，经过七层过滤的漏斗。</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<style>
text { font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", "Anthropic Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
</style>

<g>
<rect x="60" y="20" width="560" height="50" rx="8" stroke-width="0.5" fill="rgb(241, 239, 232)" stroke="rgb(95, 94, 90)"/>
<text x="340" y="38" text-anchor="middle" dominant-baseline="central" fill="rgb(68, 68, 65)" font-size="14" font-weight="500">群里偷来的原图</text>
<text x="340" y="56" text-anchor="middle" dominant-baseline="central" fill="rgb(95, 94, 90)" font-size="12">所有非 bot 图片，md5 去重</text>
</g>
<line x1="340" y1="70" x2="340" y2="88" marker-end="url(#arrow)" fill="none" stroke="rgb(115, 114, 108)" stroke-width="1.5"/>

<g>
<rect x="100" y="88" width="480" height="50" rx="8" stroke-width="0.5" fill="rgb(238, 237, 254)" stroke="rgb(83, 74, 183)"/>
<text x="340" y="106" text-anchor="middle" dominant-baseline="central" fill="rgb(60, 52, 137)" font-size="14" font-weight="500">第 1 步：文字打标</text>
<text x="340" y="124" text-anchor="middle" dominant-baseline="central" fill="rgb(83, 74, 183)" font-size="12">Tagger 只读聊天上下文，不看图</text>
</g>
<line x1="340" y1="138" x2="340" y2="156" marker-end="url(#arrow)" fill="none" stroke="rgb(115, 114, 108)" stroke-width="1.5"/>

<g>
<rect x="120" y="156" width="440" height="50" rx="8" stroke-width="0.5" fill="rgb(238, 237, 254)" stroke="rgb(83, 74, 183)"/>
<text x="340" y="174" text-anchor="middle" dominant-baseline="central" fill="rgb(60, 52, 137)" font-size="14" font-weight="500">第 2 步：persona-fit 文字门</text>
<text x="340" y="192" text-anchor="middle" dominant-baseline="central" fill="rgb(83, 74, 183)" font-size="12">推断出的情绪是否合人设</text>
</g>
<line x1="340" y1="206" x2="340" y2="224" marker-end="url(#arrow)" fill="none" stroke="rgb(115, 114, 108)" stroke-width="1.5"/>

<g>
<rect x="140" y="224" width="400" height="50" rx="8" stroke-width="0.5" fill="rgb(238, 237, 254)" stroke="rgb(83, 74, 183)"/>
<text x="340" y="242" text-anchor="middle" dominant-baseline="central" fill="rgb(60, 52, 137)" font-size="14" font-weight="500">第 3 步：视觉审美门</text>
<text x="340" y="260" text-anchor="middle" dominant-baseline="central" fill="rgb(83, 74, 183)" font-size="12">视觉模型按像素判风格</text>
</g>
<line x1="340" y1="274" x2="340" y2="292" marker-end="url(#arrow)" fill="none" stroke="rgb(115, 114, 108)" stroke-width="1.5"/>

<g>
<rect x="160" y="292" width="360" height="50" rx="8" stroke-width="0.5" fill="rgb(225, 245, 238)" stroke="rgb(15, 110, 86)"/>
<text x="340" y="310" text-anchor="middle" dominant-baseline="central" fill="rgb(8, 80, 65)" font-size="14" font-weight="500">第 4 步：eval 反馈闭环</text>
<text x="340" y="328" text-anchor="middle" dominant-baseline="central" fill="rgb(15, 110, 86)" font-size="12">累积低分自动降级</text>
</g>
<line x1="340" y1="342" x2="340" y2="360" marker-end="url(#arrow)" fill="none" stroke="rgb(115, 114, 108)" stroke-width="1.5"/>

<g>
<rect x="180" y="360" width="320" height="50" rx="8" stroke-width="0.5" fill="rgb(225, 245, 238)" stroke="rgb(15, 110, 86)"/>
<text x="340" y="378" text-anchor="middle" dominant-baseline="central" fill="rgb(8, 80, 65)" font-size="14" font-weight="500">第 5 步：tag 选取</text>
<text x="340" y="396" text-anchor="middle" dominant-baseline="central" fill="rgb(15, 110, 86)" font-size="12">同义词匹配 + 新鲜度加分</text>
</g>
<line x1="340" y1="410" x2="340" y2="428" marker-end="url(#arrow)" fill="none" stroke="rgb(115, 114, 108)" stroke-width="1.5"/>

<g>
<rect x="200" y="428" width="280" height="50" rx="8" stroke-width="0.5" fill="rgb(225, 245, 238)" stroke="rgb(15, 110, 86)"/>
<text x="340" y="446" text-anchor="middle" dominant-baseline="central" fill="rgb(8, 80, 65)" font-size="14" font-weight="500">第 6 步：孤儿条目跳过</text>
<text x="340" y="464" text-anchor="middle" dominant-baseline="central" fill="rgb(15, 110, 86)" font-size="12">文件丢失的条目剔除</text>
</g>
<line x1="340" y1="478" x2="340" y2="496" marker-end="url(#arrow)" fill="none" stroke="rgb(115, 114, 108)" stroke-width="1.5"/>

<g>
<rect x="220" y="496" width="240" height="50" rx="8" stroke-width="0.5" fill="rgb(250, 236, 231)" stroke="rgb(153, 60, 29)"/>
<text x="340" y="514" text-anchor="middle" dominant-baseline="central" fill="rgb(113, 43, 19)" font-size="14" font-weight="500">第 7 步：启动清理</text>
<text x="340" y="532" text-anchor="middle" dominant-baseline="central" fill="rgb(153, 60, 29)" font-size="12">不合格条目物理删除</text>
</g>

<text x="340" y="572" text-anchor="middle" dominant-baseline="central" fill="rgb(61, 61, 58)" font-size="12">结果：只有合人设的表情能进入候选</text>
</svg>
