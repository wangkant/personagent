<svg width="100%" viewBox="0 0 680 460" role="img" xmlns="http://www.w3.org/2000/svg">
<title>热加载迭代闭环</title>
<desc>eval.jsonl 里的低分回复推动 prompt 补丁，通过动态 few-shot 检索在下次类似输入时注入。</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<style>
text { font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", "Anthropic Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
</style>

<g>
<rect x="240" y="40" width="200" height="60" rx="8" stroke-width="0.5" fill="rgb(250, 236, 231)" stroke="rgb(153, 60, 29)"/>
<text x="340" y="62" text-anchor="middle" dominant-baseline="central" fill="rgb(113, 43, 19)" font-size="14" font-weight="500">eval.jsonl 低分</text>
<text x="340" y="82" text-anchor="middle" dominant-baseline="central" fill="rgb(153, 60, 29)" font-size="12">异步自评低于 2 分</text>
</g>

<line x1="440" y1="70" x2="510" y2="140" marker-end="url(#arrow)" fill="none" stroke="rgb(115, 114, 108)" stroke-width="1.5"/>

<g>
<rect x="460" y="140" width="200" height="60" rx="8" stroke-width="0.5" fill="rgb(238, 237, 254)" stroke="rgb(83, 74, 183)"/>
<text x="560" y="162" text-anchor="middle" dominant-baseline="central" fill="rgb(60, 52, 137)" font-size="14" font-weight="500">定位归属块</text>
<text x="560" y="182" text-anchor="middle" dominant-baseline="central" fill="rgb(83, 74, 183)" font-size="12">STYLE_GUIDE / output_filter</text>
</g>

<line x1="560" y1="200" x2="490" y2="270" marker-end="url(#arrow)" fill="none" stroke="rgb(115, 114, 108)" stroke-width="1.5"/>

<g>
<rect x="300" y="270" width="220" height="60" rx="8" stroke-width="0.5" fill="rgb(238, 237, 254)" stroke="rgb(83, 74, 183)"/>
<text x="410" y="292" text-anchor="middle" dominant-baseline="central" fill="rgb(60, 52, 137)" font-size="14" font-weight="500">打 prompt 补丁</text>
<text x="410" y="312" text-anchor="middle" dominant-baseline="central" fill="rgb(83, 74, 183)" font-size="12">热加载或 feedback.jsonl 样例对</text>
</g>

<line x1="300" y1="300" x2="220" y2="270" marker-end="url(#arrow)" fill="none" stroke="rgb(115, 114, 108)" stroke-width="1.5"/>

<g>
<rect x="20" y="240" width="200" height="60" rx="8" stroke-width="0.5" fill="rgb(225, 245, 238)" stroke="rgb(15, 110, 86)"/>
<text x="120" y="262" text-anchor="middle" dominant-baseline="central" fill="rgb(8, 80, 65)" font-size="14" font-weight="500">Few-shot 检索</text>
<text x="120" y="282" text-anchor="middle" dominant-baseline="central" fill="rgb(15, 110, 86)" font-size="12">2 字 ngram + 时间衰减</text>
</g>

<line x1="120" y1="240" x2="120" y2="170" marker-end="url(#arrow)" fill="none" stroke="rgb(115, 114, 108)" stroke-width="1.5"/>

<g>
<rect x="20" y="110" width="200" height="60" rx="8" stroke-width="0.5" fill="rgb(225, 245, 238)" stroke="rgb(15, 110, 86)"/>
<text x="120" y="132" text-anchor="middle" dominant-baseline="central" fill="rgb(8, 80, 65)" font-size="14" font-weight="500">下次匹配注入</text>
<text x="120" y="152" text-anchor="middle" dominant-baseline="central" fill="rgb(15, 110, 86)" font-size="12">类似输入触发样例对</text>
</g>

<line x1="220" y1="130" x2="240" y2="80" marker-end="url(#arrow)" fill="none" stroke="rgb(115, 114, 108)" stroke-width="1.5"/>

<g>
<rect x="200" y="380" width="280" height="50" rx="8" stroke-width="0.5" fill="rgb(241, 239, 232)" stroke="rgb(95, 94, 90)"/>
<text x="340" y="405" text-anchor="middle" dominant-baseline="central" fill="rgb(95, 94, 90)" font-size="12">output_filter.json 与 lorebook.json 热加载</text>
</g>
</svg>
