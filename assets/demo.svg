<svg xmlns="http://www.w3.org/2000/svg" width="720" height="472" viewBox="0 0 720 472" role="img" aria-label="persona-llm-agent terminal demo">
<title>persona-llm-agent — try_chat.py demo</title>
<desc>A looping terminal session: you type, the agent replies like a real person and tags each reply with an intent.</desc>
<style>text{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,'Liberation Mono',monospace;font-size:14.5px;dominant-baseline:middle;white-space:pre;}.dot{}@keyframes r0{0%,1.5%{opacity:0}2.1%,94.0%{opacity:1}99.0%,100%{opacity:0}}@keyframes r1{0%,5.0%{opacity:0}5.6%,94.0%{opacity:1}99.0%,100%{opacity:0}}@keyframes r2{0%,8.0%{opacity:0}8.6%,94.0%{opacity:1}99.0%,100%{opacity:0}}@keyframes r3{0%,13.0%{opacity:0}13.6%,94.0%{opacity:1}99.0%,100%{opacity:0}}@keyframes r4{0%,17.0%{opacity:0}17.6%,94.0%{opacity:1}99.0%,100%{opacity:0}}@keyframes r5{0%,20.0%{opacity:0}20.6%,94.0%{opacity:1}99.0%,100%{opacity:0}}@keyframes r6{0%,26.0%{opacity:0}26.6%,94.0%{opacity:1}99.0%,100%{opacity:0}}@keyframes r7{0%,30.0%{opacity:0}30.6%,94.0%{opacity:1}99.0%,100%{opacity:0}}@keyframes r8{0%,33.0%{opacity:0}33.6%,94.0%{opacity:1}99.0%,100%{opacity:0}}@keyframes r9{0%,39.0%{opacity:0}39.6%,94.0%{opacity:1}99.0%,100%{opacity:0}}@keyframes r10{0%,43.0%{opacity:0}43.6%,94.0%{opacity:1}99.0%,100%{opacity:0}}@keyframes r11{0%,46.0%{opacity:0}46.6%,94.0%{opacity:1}99.0%,100%{opacity:0}}@keyframes r12{0%,52.0%{opacity:0}52.6%,94.0%{opacity:1}99.0%,100%{opacity:0}}@keyframes r13{0%,57.0%{opacity:0}57.6%,94.0%{opacity:1}99.0%,100%{opacity:0}}@keyframes r14{0%,60.0%{opacity:0}60.6%,94.0%{opacity:1}99.0%,100%{opacity:0}}
@media (prefers-reduced-motion: reduce){text{animation:none!important;opacity:1!important}}</style>
<rect x="1" y="1" width="718" height="470" rx="10" fill="#0d1117" stroke="#30363d"/>
<path d="M1 11 A10 10 0 0 1 11 1 H709 A10 10 0 0 1 719 11 V40 H1 Z" fill="#161b22"/>
<circle cx="20" cy="20" r="6" fill="#ff5f56"/><circle cx="40" cy="20" r="6" fill="#ffbd2e"/><circle cx="60" cy="20" r="6" fill="#27c93f"/>
<text x="360" y="21" text-anchor="middle" fill="#6e7681" style="font-size:13px">try_chat.py — persona-llm-agent</text>
<text x="24" y="60" style="animation:r0 20.0s steps(1,end) infinite;"><tspan fill="#7ee787">$ python try_chat.py</tspan></text>
<text x="24" y="86" style="animation:r1 20.0s steps(1,end) infinite;"><tspan fill="#6e7681">=== try_chat — lang=en, model=deepseek-chat ===</tspan></text>
<text x="24" y="112" style="animation:r2 20.0s steps(1,end) infinite;"><tspan fill="#6e7681">talking to 'Nova' as 'you'.  /quit to exit</tspan></text>
<text x="24" y="138" style="animation:r3 20.0s steps(1,end) infinite;"><tspan fill="#58a6ff">you&gt; </tspan><tspan fill="#c9d1d9">doing your usual genius work today huh</tspan></text>
<text x="24" y="164" style="animation:r4 20.0s steps(1,end) infinite;"><tspan fill="#3fb950">Nova&gt; </tspan><tspan fill="#e6edf3">yeah just mashing keys and hoping a feature falls out</tspan></text>
<text x="24" y="190" style="animation:r5 20.0s steps(1,end) infinite;"><tspan fill="#6e7681">      [intent=joke]</tspan></text>
<text x="24" y="216" style="animation:r6 20.0s steps(1,end) infinite;"><tspan fill="#58a6ff">you&gt; </tspan><tspan fill="#c9d1d9">spent 3 hours on this and ctrl+z'd it into the void</tspan></text>
<text x="24" y="242" style="animation:r7 20.0s steps(1,end) infinite;"><tspan fill="#3fb950">Nova&gt; </tspan><tspan fill="#e6edf3">rip. take five before you go back in</tspan></text>
<text x="24" y="268" style="animation:r8 20.0s steps(1,end) infinite;"><tspan fill="#6e7681">      [intent=vent]</tspan></text>
<text x="24" y="294" style="animation:r9 20.0s steps(1,end) infinite;"><tspan fill="#58a6ff">you&gt; </tspan><tspan fill="#c9d1d9">thinking about rewriting the frontend react → svelte</tspan></text>
<text x="24" y="320" style="animation:r10 20.0s steps(1,end) infinite;"><tspan fill="#3fb950">Nova&gt; </tspan><tspan fill="#e6edf3">ah, a new arc. no wonder the chat's been lively lately</tspan></text>
<text x="24" y="346" style="animation:r11 20.0s steps(1,end) infinite;"><tspan fill="#6e7681">      [intent=troll]</tspan></text>
<text x="24" y="372" style="animation:r12 20.0s steps(1,end) infinite;"><tspan fill="#58a6ff">you&gt; </tspan><tspan fill="#c9d1d9">[image: 5-star splash art]  FINALLY pulled them</tspan></text>
<text x="24" y="398" style="animation:r13 20.0s steps(1,end) infinite;"><tspan fill="#3fb950">Nova&gt; </tspan><tspan fill="#e6edf3">the gacha gods have chosen  </tspan><tspan fill="#d29922">[STICKER:smug]</tspan></text>
<text x="24" y="424" style="animation:r14 20.0s steps(1,end) infinite;"><tspan fill="#6e7681">      [intent=share]</tspan></text>
</svg>
